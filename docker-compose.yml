services:
  # Продакшен: сборка + nginx (статика + прокси на cashapps.ru)
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    restart: unless-stopped

  # Разработка с HMR (опционально): docker compose --profile dev up dev
  dev:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    profiles:
      - dev

volumes:
  node_modules:
